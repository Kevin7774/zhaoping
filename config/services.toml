[defaults]
document_parser = "auto_document_parser"
embedding = "bge_m3_local"
evaluation = "self_rsi_evaluator"
vector_store = "qdrant_local"
ocr = "aliyun_ocr"
search = "due_diligence_federated_search"
mcp = "disabled_mcp"
structured_output = "outlines_structured_output"
database = "disabled_database"
llm = "openrouter_auto_reasoning"
email_discovery = "hunter_email_finder"
email_verification = "zerobounce_email_validation"
email_delivery = "postmark_compliant_email"
scraping = "firecrawl_scrape"

[services.auto_document_parser]
type = "document_parser"
provider = "auto"
description = "Route Markdown/TXT to plain text and rich documents to Docling."

[services.docling_document_parser]
type = "document_parser"
provider = "docling"
description = "Parse PDF/DOCX/image documents through Docling."

[services.plain_text_document_parser]
type = "document_parser"
provider = "plain_text"
description = "Read Markdown/TXT files directly."

[services.bge_m3_local]
type = "embedding"
provider = "sentence_transformers"
model_name = "BAAI/bge-m3"
device = "auto"
batch_size = 8
vector_size = 1024
show_progress_bar = true
description = "Local multilingual embedding model, optimized for the 4090 MVP."

[services.self_rsi_evaluator]
type = "evaluation"
provider = "self_rsi"
suite_id = "candidate_evaluation_core"
baseline_threshold = 0.8
description = "Deterministic self-RSI evaluator for evaluation, test, feedback, and iteration loops."

[services.qdrant_local]
type = "vector_store"
provider = "qdrant_local"
path = "./qdrant_mvp_store"
collection_name = "robot_talents"
distance = "cosine"
embedding_service = "bge_m3_local"
vector_size = 1024
description = "Local file-backed Qdrant store for MVP private data."

[services.docling_ocr]
type = "ocr"
provider = "docling"
description = "Default OCR/multimodal document extraction backend."

[services.aliyun_ocr]
type = "ocr"
provider = "aliyun_ocr"
access_key_id_env = "ALIBABA_CLOUD_ACCESS_KEY_ID"
access_key_secret_env = "ALIBABA_CLOUD_ACCESS_KEY_SECRET"
region_id = "cn-hangzhou"
endpoint = "ocr-api.cn-hangzhou.aliyuncs.com"
description = "Alibaba Cloud OCR RecognizeGeneral provider for image/document text extraction."

[services.disabled_search]
type = "search"
provider = "disabled"
description = "Placeholder. Configure a concrete search provider before use."

[services.talent_source_catalog]
type = "search"
provider = "source_catalog"
skill_name = "search_data_sources"
description = "Local search source catalog for recruiting, company, academic, patent, funding, and conference intelligence."

[services.agent_reach_social_search]
type = "search"
provider = "agent_reach_social"
tool_name = "Agent-Reach"
source_key = "agent_reach_social_search"
display_name_zh = "Agent-Reach 社媒搜索"
source_type = "social_platform_search"
project_url = "https://github.com/Panniantong/Agent-Reach"
supported_platforms = ["微博", "B站", "V2EX", "知乎", "掘金", "CSDN", "SegmentFault", "X/Twitter", "Reddit", "YouTube", "小红书", "抖音", "微信公众号"]
required_commands = ["agent-reach", "mcporter", "opencli"]
install_hint = "pip install agent-reach && agent-reach install；npm install -g @jackwener/opencli"
manual_setup_required = false
execute_enabled = true
timeout_seconds = 60
purpose = "External CLI/MCP scaffold for social and niche platform search/read workflows."
access_pattern = "Install Agent-Reach and use only platform-compliant public pages, official APIs, user-authorized login state, or user-provided exports."
risk_level = "high"
freshness = "daily"
setup_steps = ["Install Agent-Reach and OpenCLI.", "Run platform-specific login/setup only with user authorization.", "Keep per-platform commands configurable and review platform terms before scheduled runs."]
guardrails = ["不绕过平台登录、付费墙、robots.txt、访问控制或服务条款。", "社媒内容只能作为线索，关键结论必须回看原文并交叉验证。", "候选人相关信息仅限公开职业信息和岗位相关能力证据。"]
description = "Executable Agent-Reach/OpenCLI adapter for social platform search/read workflows across 微博、B站、V2EX、知乎、掘金、CSDN、SegmentFault and retained social channels."

[services.agent_reach_social_search.platform_commands.weibo]
name_zh = "微博"
command = "mcporter"
args = ["call", 'weibo.search_content(keyword: {query_json}, limit: {limit})']

[services.agent_reach_social_search.platform_commands.bilibili]
name_zh = "B站"
command = "mcporter"
args = ["call", 'exa.web_search_exa(query: "site:bilibili.com/video {query_mcporter}", numResults: {limit})']

[services.agent_reach_social_search.platform_commands.v2ex]
name_zh = "V2EX"
command = "mcporter"
args = ["call", 'exa.web_search_exa(query: "site:v2ex.com/t {query_mcporter}", numResults: {limit})']

[services.agent_reach_social_search.platform_commands.zhihu]
name_zh = "知乎"
command = "mcporter"
args = ["call", 'exa.web_search_exa(query: "site:zhihu.com {query_mcporter}", numResults: {limit})']

[services.agent_reach_social_search.platform_commands.juejin]
name_zh = "掘金"
command = "mcporter"
args = ["call", 'exa.web_search_exa(query: "site:juejin.cn {query_mcporter}", numResults: {limit})']

[services.agent_reach_social_search.platform_commands.csdn]
name_zh = "CSDN"
command = "mcporter"
args = ["call", 'exa.web_search_exa(query: "site:blog.csdn.net {query_mcporter}", numResults: {limit})']

[services.agent_reach_social_search.platform_commands.segmentfault]
name_zh = "SegmentFault"
command = "mcporter"
args = ["call", 'exa.web_search_exa(query: "site:segmentfault.com {query_mcporter}", numResults: {limit})']

[services.scrapling_adaptive_scrape]
type = "search"
provider = "external_search_tool"
tool_name = "Scrapling"
source_key = "scrapling_adaptive_scrape"
display_name_zh = "Scrapling 自适应抓取"
source_type = "adaptive_web_scraping"
project_url = "https://github.com/D4Vinci/Scrapling"
supported_platforms = ["Public web pages", "Rendered pages", "Structured extraction"]
install_hint = 'pip install "scrapling[fetchers]" && scrapling install'
required_python_module = "scrapling"
manual_setup_required = false
execute_enabled = false
purpose = "Adaptive web scraping and structured extraction for public or authorized pages after compliance review."
access_pattern = "Use Scrapling only for public or explicitly authorized pages; obey robots.txt, crawl delays, platform terms, and data minimization."
risk_level = "high"
freshness = "daily"
setup_steps = ["Install Scrapling with fetcher extras.", "Install browser dependencies with scrapling install.", "Define per-site selectors, rate limits, robots handling, and data retention before enabling execution."]
guardrails = ["不把反爬能力用于绕过访问控制、付费墙、登录限制或平台条款。", "批量抓取必须设置速率限制、域名边界、数据最小化和失败恢复。", "网页改版后的自适应定位结果必须抽样复核。"]
description = "External Scrapling adapter for adaptive public/authorized web extraction planning."

[services.browser_use_agent_search]
type = "search"
provider = "external_search_tool"
tool_name = "Browser-use"
source_key = "browser_use_agent_search"
display_name_zh = "Browser-use 浏览器操作"
source_type = "browser_automation"
project_url = "https://github.com/browser-use/browser-use"
supported_platforms = ["Logged-in websites", "Forms", "Back-office pages", "Public web apps"]
install_hint = "uv add browser-use && uvx browser-use install"
required_python_module = "browser_use"
manual_setup_required = true
execute_enabled = false
purpose = "LLM-driven browser automation for multi-step web tasks and authorized logged-in pages."
access_pattern = "Use Browser-use only with explicit user authorization, domain allowlists, least-privilege browser profiles, and human review for sensitive actions."
risk_level = "high"
freshness = "on_demand"
setup_steps = ["Install Browser-use and browser dependencies.", "Configure an approved LLM provider or Browser Use Cloud key outside source control.", "Set domain allowlists and decide whether existing Chrome login state may be reused."]
guardrails = ["涉及登录态、财务、个人、工作关键系统或后台操作时必须人工确认。", "不要让模型读取或提交不必要的敏感字段。", "执行前限制域名、动作范围、超时和截图/日志保留策略。"]
description = "External Browser-use adapter for authorized browser automation and logged-in page operation planning."

[services.claude_chrome_supervised_search]
type = "search"
provider = "external_search_tool"
tool_name = "Claude in Chrome"
source_key = "claude_chrome_supervised_search"
display_name_zh = "Claude in Chrome 监督操作"
source_type = "supervised_browser_operation"
project_url = "https://claude.ai/chrome"
supported_platforms = ["User-supervised Chrome tabs", "Complex authentication pages", "Manual review workflows"]
install_hint = "Install the official Claude in Chrome extension from claude.ai/chrome."
manual_setup_required = true
execute_enabled = false
purpose = "Human-supervised browser operation path for complex authentication or workflows the user must watch."
access_pattern = "Use the official Claude in Chrome extension only in the user's real browser with explicit site permission and user supervision."
risk_level = "high"
freshness = "on_demand"
setup_steps = ["Install the official extension.", "Grant permissions only to trusted sites.", "Keep the user watching for sensitive clicks, form submissions, downloads, and account actions."]
guardrails = ["这不是后端可自动调用的 API；必须由用户在真实 Chrome 中监督。", "高风险网站、财务、个人、工作关键动作必须人工确认。", "不要采集或回传不必要的账号、Cookie、密码或私密内容。"]
description = "Manual supervised browser-operation entry for Claude in Chrome workflows."

[services.web_access_cdp_search]
type = "search"
provider = "external_search_tool"
tool_name = "Web-access"
source_key = "web_access_cdp_search"
display_name_zh = "Web-access Chrome 联网"
source_type = "chrome_cdp_web_access"
project_url = "https://github.com/eze-is/web-access"
supported_platforms = ["WebSearch", "WebFetch", "curl", "Chrome CDP", "Local bookmarks/history"]
install_hint = "pnpm dlx skills add eze-is/web-access -g --all --copy 或 npx skills add eze-is/web-access"
required_command = "node"
required_skill_path = "~/.agents/skills/web-access/SKILL.md"
manual_setup_required = true
execute_enabled = false
purpose = "SKILL-based web access path that can route between search, fetch, curl, and Chrome CDP with user-authorized browser state."
access_pattern = "Install the skill, enable Chrome remote debugging only when approved, and restrict CDP access to user-authorized browsing contexts."
risk_level = "high"
freshness = "daily"
setup_steps = ["Install the web-access skill.", "Enable Chrome remote debugging only on trusted local machines.", "Review which bookmarks, history, tabs, and logged-in pages can be used."]
guardrails = ["CDP 接管真实浏览器前必须获得用户授权。", "不要读取无关书签、历史、标签页、Cookie 或私密页面。", "公开搜索优先，只有公开搜索不足且用户授权时才使用登录态浏览器。"]
description = "External Web-access skill adapter for search/fetch/curl/CDP planning."

