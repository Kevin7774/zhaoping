    <rect class="box-secondary" x="0" y="0" width="480" height="88" rx="7"/>
    <text x="18" y="24" class="label">5. 输出给前端</text>
    <text x="18" y="44" class="small">搜索运行追踪 search_run_trace</text>
    <text x="18" y="60" class="small">包含 selected/errors/provider_health/layer_coverage/evidence_gaps</text>
    <text x="18" y="76" class="tiny">LiveTaskSummary 和 HumanGate 可展示 trace。</text>
