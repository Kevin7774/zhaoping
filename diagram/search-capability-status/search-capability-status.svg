      .ok { fill: #86efac; font-size: 9px; font-weight: 600; }
      .danger { fill: #fda4af; font-size: 9px; font-weight: 600; }
      .box-primary { fill: rgba(8,51,68,0.48); stroke: #22d3ee; stroke-width: 1.4; }
      .box-secondary { fill: rgba(6,78,59,0.42); stroke: #34d399; stroke-width: 1.4; }
