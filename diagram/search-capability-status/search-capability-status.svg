  <rect width="1900" height="1640" fill="#0f172a"/>
  <rect width="1900" height="1640" fill="url(#grid)"/>

  <text x="40" y="44" class="title">zhaoping 搜索能力状态图</text>
  <text x="40" y="68" class="subtitle">当前快照：Search API 注册 44 个 search service = 1 active 默认 + 42 available 可路由 + 1 disabled；ProjectDetailPage 前端直接映射 29 个，其中默认找候选人层 17 个。</text>

  <!-- Summary counters -->
  <g transform="translate(40,92)">
    <rect class="mask" x="0" y="0" width="280" height="76" rx="8"/>
    <rect class="box-secondary" x="0" y="0" width="280" height="76" rx="8"/>
    <text x="18" y="25" class="label">后端 Search API</text>
    <text x="18" y="48" class="ok">43 provided = 1 active + 42 available</text>
    <text x="18" y="64" class="tiny">1 disabled placeholder</text>
  </g>
  <g transform="translate(340,92)">
