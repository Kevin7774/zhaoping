      .connector { fill: none; stroke: #64748b; stroke-width: 1.6; marker-end: url(#arrow); }
      .connector-cyan { fill: none; stroke: #22d3ee; stroke-width: 1.8; marker-end: url(#arrow-cyan); }
      .connector-amber { fill: none; stroke: #fbbf24; stroke-width: 1.8; marker-end: url(#arrow-amber); }
