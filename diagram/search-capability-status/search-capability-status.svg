    <text x="18" y="76" class="tiny">provider=source_catalog；数据来自 app/skills/search_sources.py 的 SEARCH_DATA_SOURCES</text>
  </g>
  <g transform="translate(60,460)">
    <rect class="mask" x="0" y="0" width="500" height="110" rx="7"/>
    <rect class="box-secondary" x="0" y="0" width="500" height="110" rx="7"/>
    <text x="18" y="24" class="label">available 候选人搜索主路径：17 个默认来源层 provider</text>
    <text x="18" y="43" class="small">Brave, OpenAlex x3, Semantic Scholar x2, GitHub x5, Hugging Face,</text>
    <text x="18" y="59" class="small">Agent-Reach, OpenCLI Platform, GDELT, GNews, Education Competition</text>
    <text x="18" y="76" class="ok">这些是后端 candidate_sourcing 默认层组合。</text>
    <text x="18" y="93" class="tiny">如果前端预算 max_providers 足够，普通“找候选人”会覆盖这 17 个。</text>
  </g>
  <g transform="translate(60,586)">
    <rect class="mask" x="0" y="0" width="500" height="92" rx="7"/>
    <rect class="box-primary" x="0" y="0" width="500" height="92" rx="7"/>
