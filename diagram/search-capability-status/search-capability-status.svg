    <text x="18" y="48" class="ok">前端 POLICY_BUDGETS 与后端 bounded_live/deep_live 对齐。</text>
    <text x="18" y="64" class="tiny">catalog 推荐会影响 live provider 排序，然后再受预算截断。</text>
  </g>

