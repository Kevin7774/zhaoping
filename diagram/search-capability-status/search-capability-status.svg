  <rect width="1900" height="1640" fill="#0f172a"/>
  <rect width="1900" height="1640" fill="url(#grid)"/>

  <text x="40" y="44" class="title">zhaoping 搜索能力状态图</text>
  <text x="40" y="68" class="subtitle">当前快照：Search API 注册 38 个 search service = 1 active 默认 + 37 available；ProjectDetailPage 前端映射全部 36 个可执行 search provider，默认找候选人层 14 个。</text>

