  <!-- Runtime column -->
  <g transform="translate(1330,266)">
    <rect class="mask" x="0" y="0" width="480" height="72" rx="7"/>
    <rect class="box-primary" x="0" y="0" width="480" height="72" rx="7"/>
    <text x="18" y="24" class="label">1. 用户点击“找候选人”</text>
    <text x="18" y="44" class="small">ProjectDetailPage -> runProjectScenario -> POST /api/scenarios/run</text>
  </g>
  <g transform="translate(1330,354)">
    <rect class="mask" x="0" y="0" width="480" height="86" rx="7"/>
    <rect class="box-secondary" x="0" y="0" width="480" height="86" rx="7"/>
    <text x="18" y="24" class="label">2. 后端规范化搜索配置</text>
    <text x="18" y="44" class="small">_search_config_from_ctx -> source_layers + search_budget</text>
    <text x="18" y="61" class="tiny">无前端配置时使用后端默认；有前端配置时以前端传入预算为准。</text>
  </g>
  <g transform="translate(1330,456)">
    <rect class="mask" x="0" y="0" width="480" height="98" rx="7"/>
    <rect class="box-accent" x="0" y="0" width="480" height="98" rx="7"/>
    <text x="18" y="24" class="label">3. Catalog 推荐优先 + 分层轮转</text>
    <text x="18" y="44" class="small">先把 recommended_sources 映射到 executable_services 并前置。</text>
    <text x="18" y="61" class="small">再按 max_providers 截断；未选中记为 deferred_by_live_budget。</text>
    <text x="18" y="78" class="tiny">这就是为什么注册 43 个，但普通任务不会全部跑。</text>
  </g>
  <g transform="translate(1330,570)">
    <rect class="mask" x="0" y="0" width="480" height="72" rx="7"/>
    <rect class="box-tertiary" x="0" y="0" width="480" height="72" rx="7"/>
    <text x="18" y="24" class="label">4. 并发执行 + 返回审计</text>
    <text x="18" y="44" class="small">ThreadPoolExecutor -> provider.search -> provider errors/results</text>
  </g>
  <g transform="translate(1330,658)">
