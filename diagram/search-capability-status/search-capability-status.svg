    <rect class="box-primary" x="0" y="0" width="300" height="76" rx="8"/>
    <text x="18" y="25" class="label">前端 ProjectDetailPage</text>
    <text x="18" y="48" class="ok">29 provider mapped in source layers</text>
    <text x="18" y="64" class="tiny">默认开启 17；可选 12；peopleDatabase 0</text>
